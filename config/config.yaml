data_ingestion:
  bucket_name : "liver_disease_bucket_neat_chain_464913"
  bucket_file_name : "liver_patient.csv"
  train_ratio : 0.8

data_processing:
  target_column: "Dataset"
  categorical_columns:
    - "Gender"
  numerical_columns:
    - "Age"
    - "Total_Bilirubin"
    - "Direct_Bilirubin"
    - "Alkaline_Phosphotase"
    - "Alamine_Aminotransferase"
    - "Aspartate_Aminotransferase"
    - "Total_Protiens"
    - "Albumin"
    - "Albumin_and_Globulin_Ratio"
  outlier_iqr_multiplier: 3.0
  skewness_threshold: 1.0
  no_of_features: 7