stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/raw/

  data_processing:
    cmd: python src/data_processing.py
    deps:
      - src/data_processing.py
      - config/config.yaml
      - artifacts/raw/
    outs:
      - artifacts/processed/

  model_training:
    cmd: python src/model_training.py
    deps:
      - src/model_training.py
      - artifacts/processed/
    outs:
      - artifacts/models/